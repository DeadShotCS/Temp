<style>
    #status_message_container {
        position: absolute;
        left: 50%;
        top: 10px; /* Slightly offset from the very top */
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 10000; /* Ensure it stays above everything */
    }

    .status-bubble {
        padding: 5px 20px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid transparent;
        display: none;
        letter-spacing: 1px;
        background: #000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        animation: statusDrop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes statusDrop {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .status-error { border-color: #ef4444; color: #ef4444; border-bottom: 2px solid #ef4444; }
    .status-success { border-color: #22c55e; color: #22c55e; border-bottom: 2px solid #22c55e; }
    .status-info { border-color: #3b82f6; color: #3b82f6; border-bottom: 2px solid #3b82f6; }
</style>

<div id="status_message_container">
    <div id="unified_status" class="status-bubble"></div>
</div>

<script>
    function showStatus(msg, type = 'info') {
        const statusEl = document.getElementById('unified_status');
        if (!statusEl) return;

        statusEl.className = 'status-bubble status-' + type;
        statusEl.innerText = `[ ${msg} ]`;
        statusEl.style.display = 'block';

        if (window.statusTimeout) clearTimeout(window.statusTimeout);
        window.statusTimeout = setTimeout(() => {
            statusEl.style.display = 'none';
        }, 4000);
    }
</script>
