<!DOCTYPE html>
<html>
<head>
    <title>ARCHIVE SYSTEM // LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0c; color: #d946ef; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111114; border: 1px solid #27272a; padding: 30px; width: 300px; }
        h2 { font-size: 14px; text-transform: uppercase; margin-top: 0; letter-spacing: 2px; }
        input { background: #000; border: 1px solid #27272a; color: #fff; width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; font-family: inherit; }
        button { background: #d946ef; border: none; color: #fff; width: 100%; padding: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .error { color: #ef4444; font-size: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>SYSTEM_ACCESS</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <button type="submit">INITIALIZE_SESSION</button>
        </form>
    </div>
</body>
</html>
