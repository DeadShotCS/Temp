<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHIVE SYSTEM // MANAGER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d946ef; --bg: #0a0a0c; --panel: #111114; --font: 'JetBrains Mono', monospace; --comment: #6a9955; --error-red: #ef4444; --border: #27272a; }
        
        body { background: var(--bg); color: #a1a1aa; font-family: var(--font); font-size: 11px; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .title-bar { height: 40px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .title-text { color: var(--accent); font-weight: 700; text-transform: uppercase; text-decoration: none; font-size: 11px; letter-spacing: 1px; }
        .proj-display { color: #fff; font-weight: bold; }
        .user-display { color: var(--comment); font-weight: bold; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
        .nav-link { color: #52525b; text-decoration: none; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
        .logout-link { color: #ef4444; text-decoration: none; font-size: 10px; font-weight: 700; text-transform: uppercase; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 220px; border-right: 1px solid var(--border); padding: 12px; background: var(--panel); flex-shrink: 0; }
        .nav-label { color: #52525b; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .btn-nav { background: #1a1a1d; border: 1px solid #333; color: #aaa; font-size: 10px; padding: 10px; font-weight: 700; cursor: pointer; text-align: left; text-transform: uppercase; border-left: 3px solid transparent; margin-bottom: 4px; width: 100%; box-sizing: border-box; }
        .btn-nav.active { border-left-color: var(--accent); color: #fff; background: #000; }

        /* VIEWPORT */
        .viewport { flex: 1; padding: 15px; background: #050506; overflow-y: auto; display: flex; flex-direction: column; }
        .inner-box { background: #0c0c0e; border: 1px solid #18181b; margin-bottom: 12px; }
        .box-header { background: #111114; border-bottom: 1px solid #18181b; padding: 5px 12px; }
        .box-title { color: var(--accent); font-weight: 800; font-size: 10px; text-transform: uppercase; }
        .box-content { padding: 12px; }

        .filter-label { color: #e4e4e7; font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { background: #000 !important; border: 1px solid #27272a !important; color: #ccc !important; font-family: var(--font); font-size: 11px !important; width: 100%; padding: 8px; border-radius: 0; margin-bottom: 0px; box-sizing: border-box; }
        
        .input-group { margin-bottom: 12px; }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* FINDINGS */
        .finding-block { border: 1px solid #18181b; background: #08080a; margin-bottom: 8px; }
        .finding-header { background: #111114; padding: 6px 12px; font-weight: 800; color: #71717a; border-bottom: 1px solid #18181b; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .status-indicator { font-size: 10px; color: var(--accent); }
        
        .finding-body { padding: 12px; display: grid; grid-template-columns: 180px 1.4fr 1fr; gap: 15px; padding-bottom: 5px; }

        .row { display: flex; gap: 20px; } .col { flex: 1; }

        /* ACTION BAR */
        .action-bar { background: #000; border-top: 1px solid var(--border); padding: 15px 30px; display: flex; gap: 12px; margin-top: auto; }
        .btn-exe { background: var(--accent); border: none; color: #fff; padding: 12px 25px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 10px; }
        .btn-alt { background: #1a1a1d; border: 1px solid #333; color: #fff; padding: 12px 20px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 10px; }
        .btn-warn { background: transparent; border: 1px solid var(--error-red); color: var(--error-red); padding: 12px 20px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<template id="finding_template">
    <div class="finding-block">
        <div class="finding-header" onclick="UI.toggleCollapse(this)">
            <span class="block-id">FINDING_BLOCK_01</span>
            <span class="status-indicator">[ - ]</span>
        </div>
        <div class="finding-body">
            <div>
                <div class="input-group">
                    <label class="filter-label">FINDING TYPE</label>
                    <select class="f-type"><option>Bug</option><option>Useful</option><option>Unknown</option></select>
                </div>
                <div class="input-group">
                    <label class="filter-label">STATUS</label>
                    <select class="f-status"><option>Success</option><option>Failure</option><option>Unverified</option></select>
                </div>
            </div>
            <div>
                <label class="filter-label">DETAILS</label>
                <textarea class="f-info" style="height: 145px; resize: none;"></textarea>
            </div>
            <div>
                <div class="input-group">
                    <label class="filter-label">REQUIREMENTS</label>
                    <textarea class="f-req" style="height: 55px; resize: none;"></textarea>
                </div>
                <div class="input-group">
                    <label class="filter-label">VERIFICATION</label>
                    <textarea class="f-ver" style="height: 55px; resize: none;"></textarea>
                </div>
            </div>
        </div>
    </div>
</template>

<div class="title-bar">
    <div class="header-left">
        <a href="/" class="title-text">ARCHIVE SYSTEM // MANAGER</a>
        <span style="color:#333; margin:0 5px;">|</span>
        <span id="header_proj_name" class="proj-display">...</span>
        <span style="color:#333; margin:0 5px;">|</span>
        <span class="user-display">ADMIN</span>
    </div>
    <div class="header-right">
        <a href="/" class="nav-link">EXPLORER</a>
        <a href="/manager" class="nav-link active">COMMENT MANAGER</a>
        <a href="/logout" class="logout-link">LOGOUT</a>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <label class="nav-label">Navigation</label>
        <button class="btn-nav active" id="nav_add" onclick="UI.switchTab('add')">Add Entry</button>
        <button class="btn-nav" id="nav_view" onclick="UI.switchTab('view')">View Data</button>
        <button class="btn-nav" id="nav_export" onclick="UI.switchTab('export')">Export Data</button>
        <button class="btn-nav" id="nav_settings" onclick="UI.switchTab('settings')">Settings</button>
    </div>

    <div class="viewport">
        <div id="pane_add" class="tab-pane active">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">01 Information</span></div>
                <div class="box-content">
                    <div class="row">
                        <div class="col">
                            <label class="filter-label">NAME</label>
                            <input type="text" id="add_name" placeholder="Symbol Name...">
                        </div>
                        <div class="col" id="tag_wrapper">
                            <label class="filter-label">TAG</label>
                            <select id="add_tag" onchange="UI.checkCustom(this, 'tag')"></select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header"><span class="box-title">02 Overview</span></div>
                <div class="box-content">
                    <div class="row">
                        <div class="col" id="type_wrapper" style="max-width: 180px;">
                            <label class="filter-label">TYPE</label>
                            <select id="add_type" onchange="UI.checkCustom(this, 'type')">
                                <option value="function">Function</option>
                                <option value="service">Service</option>
                                <option value="driver">Driver</option>
                                <option value="custom">Custom...</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="filter-label">SUMMARY / DESCRIPTION</label>
                            <textarea id="add_summary" style="height: 80px; resize: none;"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header"><span class="box-title">03 Findings</span></div>
                <div class="box-content" id="findings_container"></div>
            </div>

            <div class="action-bar">
                <button class="btn-exe" onclick="Logic.saveEntry()">SAVE ENTRY</button>
                <button class="btn-alt" onclick="UI.resetForm()">RESET FORM</button>
                <button class="btn-alt" onclick="UI.addFinding()">ADD FINDING</button>
                <button class="btn-warn" onclick="UI.removeFinding()">REMOVE LAST</button>
            </div>
        </div>

        <div id="pane_view" class="tab-pane">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">Data Archive</span></div>
                <div class="box-content" id="archive_list">
                    <p style="color: var(--comment);">// ARCHIVE_READY_FOR_QUERY</p>
                </div>
            </div>
        </div>

        <div id="pane_export" class="tab-pane">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">Utility</span></div>
                <div class="box-content">
                    <button class="btn-exe">GENERATE JSON DUMP</button>
                </div>
            </div>
        </div>

        <div id="pane_settings" class="tab-pane">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">01 Project Management</span></div>
                <div class="box-content">
                    <div class="row">
                        <div class="col">
                            <label class="filter-label">SWITCH TO PROJECT</label>
                            <select id="set_proj_select">
                                </select>
                        </div>
                        <div class="col">
                            <label class="filter-label">OR CREATE NEW PROJECT</label>
                            <input type="text" id="set_proj_new" placeholder="New Project Name...">
                        </div>
                    </div>
                    <div class="action-bar" style="border:none; padding: 15px 0 0 0;">
                        <button class="btn-exe" onclick="Logic.saveSettings()">INITIALIZE / SWITCH PROJECT</button>
                    </div>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header"><span class="box-title">02 Tag Configuration</span></div>
                <div class="box-content">
                    <label class="filter-label">ACTIVE PROJECT TAGS (COMMA SEPARATED)</label>
                    <textarea id="set_tags" style="height: 100px; resize: none;" placeholder="e.g. Kernel, UserMode, Hooking"></textarea>
                    <div class="action-bar" style="border:none; padding: 15px 0 0 0;">
                        <button class="btn-alt" onclick="Logic.updateTagsOnly()">UPDATE TAGS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'status_handler.html' %}
<script src="/static/js/manager_core.js"></script>
<script>window.onload = () => Logic.init();</script>
</body>
</html>
