<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive System // Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d946ef; --bg: #0a0a0c; --panel: #111114; --font: 'JetBrains Mono', monospace; --comment: #6a9955; --error-red: #ef4444; --border: #18181b; }
        
        body { background: var(--bg); color: #a1a1aa; font-family: var(--font); font-size: 11px; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Project Context */
        .title-bar { height: 45px; background: #000; border-bottom: 1px solid #27272a; display: flex; align-items: center; padding: 0 15px; gap: 25px; }
        .title-text { color: var(--accent); font-weight: 700; text-transform: uppercase; text-decoration: none; font-size: 12px; }
        .project-context { display: flex; align-items: center; gap: 10px; flex: 1; border-left: 1px solid #27272a; padding-left: 20px; }
        .tag-pill { background: #1a1a1d; border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; font-size: 9px; font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Navigation Sidebar */
        .sidebar { width: 240px; border-right: 1px solid #27272a; padding: 15px; background: var(--panel); }
        .nav-label { color: #52525b; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .btn-nav { background: #1a1a1d; border: 1px solid #333; color: #aaa; font-size: 10px; padding: 12px; font-weight: 700; cursor: pointer; text-align: left; text-transform: uppercase; border-left: 3px solid transparent; margin-bottom: 4px; width: 100%; }
        .btn-nav:hover { background: #222; color: #fff; }
        .btn-nav.active { border-left-color: var(--accent); color: #fff; background: #000; }

        /* Viewport */
        .viewport { flex: 1; padding: 20px; background: #050506; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px; }
        .inner-box { background: #0c0c0e; border: 1px solid var(--border); padding: 0; margin-bottom: 15px; }
        .box-header { background: #111114; border-bottom: 1px solid var(--border); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; }
        .box-title { color: var(--accent); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .box-content { padding: 15px; }

        /* Form Elements */
        .filter-label { color: #71717a; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select, textarea { background: #000 !important; border: 1px solid #27272a !important; color: #ccc !important; font-family: var(--font); font-size: 11px !important; width: 100%; padding: 8px; border-radius: 0; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent) !important; outline: none; }
        
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* Finding Block - Collapsable */
        .finding-block { border: 1px solid #18181b; background: #08080a; margin-top: 10px; }
        .finding-header { background: #111114; padding: 8px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 9px; font-weight: bold; color: #52525b; }
        .finding-header:hover { background: #1a1a1d; color: #fff; }
        .finding-body { padding: 15px; display: block; }
        .finding-body.collapsed { display: none; }

        .row { display: flex; gap: 15px; } .col { flex: 1; }

        /* Bottom Sticky Actions */
        .action-bar { background: #000; border-top: 1px solid #27272a; padding: 15px; display: flex; gap: 10px; position: fixed; bottom: 0; right: 0; width: calc(100% - 240px); z-index: 100; }
        .btn-exe { background: var(--accent); border: none; color: #fff; padding: 10px 25px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 10px; }
        .btn-alt { background: #1a1a1d; border: 1px solid #333; color: #ccc; padding: 10px 20px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="title-bar">
    <a href="/" class="title-text">Archive // Manager</a>
    <div class="project-context" id="header_context">
        <span style="font-size: 9px; color: #52525b;">ACTIVE_PROJ:</span>
        <span id="header_proj_name" style="color: #fff; font-weight: bold; margin-right: 15px;">INITIALIZING...</span>
        <div id="header_tags" style="display: flex; gap: 5px;"></div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <a href="/" class="nav-link">Explorer</a>
        <span style="color: #52525b; font-size: 9px;">OP: ADMIN</span>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <label class="nav-label">Navigation</label>
        <button class="btn-nav active" id="btn_add" onclick="UI.switchTab('add')">Add Entry</button>
        <button class="btn-nav" id="btn_view" onclick="UI.switchTab('view')">View Edit Data</button>
        <button class="btn-nav" id="btn_settings" onclick="UI.switchTab('settings')">Settings</button>
        <button class="btn-nav" id="btn_export" onclick="UI.switchTab('export')">Export Data</button>
    </div>

    <div class="viewport">
        
        <div id="pane_add" class="tab-pane active">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">01 Information</span></div>
                <div class="box-content">
                    <div class="row">
                        <div class="col">
                            <label class="filter-label">Symbol Name</label>
                            <input type="text" id="add_name" placeholder="Symbol/Function Name">
                        </div>
                        <div class="col">
                            <label class="filter-label">Project Tag</label>
                            <select id="add_tag_select"></select>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <label class="filter-label">Target Library Path</label>
                        <select id="add_path"><option>E:\Learning-Certs\Notes\DSDriver\DSDriver</option></select>
                    </div>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header"><span class="box-title">02 Overview</span></div>
                <div class="box-content">
                    <label class="filter-label">Summary / Description</label>
                    <textarea id="add_summary" style="height: 80px; resize: none;"></textarea>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header">
                    <span class="box-title">03 Findings</span>
                    <span style="color: #52525b; font-size: 9px;">DYNAMIC_ENTRIES</span>
                </div>
                <div class="box-content" id="findings_container">
                    <div class="finding-block">
                        <div class="finding-header" onclick="UI.toggleCollapse(this)">
                            <span>FINDING_BLOCK_01</span>
                            <span class="toggle-icon">[ - ]</span>
                        </div>
                        <div class="finding-body">
                            <div class="row">
                                <div class="col">
                                    <label class="filter-label">Type</label>
                                    <select class="f-type">
                                        <option>Function</option>
                                        <option>Service</option>
                                        <option>Struct</option>
                                        <option>IOCTL</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label class="filter-label">Status</label>
                                    <select class="f-status">
                                        <option>SUCCESS</option>
                                        <option>FAILURE</option>
                                        <option>STATUS</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row" style="margin-top:15px;">
                                <div class="col">
                                    <label class="filter-label">Details</label>
                                    <textarea class="f-info" style="height: 100px; resize: none;"></textarea>
                                </div>
                                <div class="col">
                                    <label class="filter-label">Requirements</label>
                                    <textarea class="f-req" style="height: 40px; resize: none; margin-bottom: 10px;"></textarea>
                                    <label class="filter-label">Verification</label>
                                    <textarea class="f-ver" style="height: 40px; resize: none;"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn-exe" onclick="Logic.saveEntry()">Save Entry</button>
                <button class="btn-alt" onclick="UI.resetForm()">Reset Form</button>
                <button class="btn-alt" onclick="UI.addFinding()">+ Add Finding</button>
                <button class="btn-alt" style="color: var(--error-red);" onclick="UI.removeFinding()">- Remove Last</button>
            </div>
        </div>

        <div id="pane_settings" class="tab-pane">
            <div class="inner-box">
                <div class="box-header"><span class="box-title">Project Management</span></div>
                <div class="box-content">
                    <label class="filter-label">Switch Active Project</label>
                    <select id="settings_project_select" onchange="Logic.switchProject(this.value)"></select>
                    
                    <label class="filter-label" style="margin-top: 20px;">Create New Project</label>
                    <div class="row">
                        <div class="col"><input type="text" id="new_project_name" placeholder="Project ID..."></div>
                        <div class="col"><button class="btn-alt" style="width:100%" onclick="Logic.createProject()">Initialize</button></div>
                    </div>
                </div>
            </div>

            <div class="inner-box">
                <div class="box-header"><span class="box-title">Tag Configuration</span></div>
                <div class="box-content">
                    <label class="filter-label">Current Tags</label>
                    <div id="settings_tag_cloud" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:15px;"></div>
                    <div class="row">
                        <div class="col"><input type="text" id="new_tag_name" placeholder="New Tag..."></div>
                        <div class="col"><button class="btn-alt" style="width:100%" onclick="Logic.addTag()">Add Tag</button></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/manager_core.js"></script>
<script>window.onload = () => Logic.init();</script>
</body>
</html>
