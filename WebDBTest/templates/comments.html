<div id="tab_settings" class="tab-content">
    <div id="settings_status" style="display:none; padding:10px; border:1px solid var(--accent); background:rgba(0,255,170,0.05); color:var(--accent); font-family:monospace; font-size:10px; margin-bottom:15px;"></div>
    
    <div class="form-section">
        <div class="section-label">01 // Project Selection</div>
        <div class="row align-items-end">
            <div class="col-10">
                <label>Current Projects</label>
                <select id="set_project_select"></select>
            </div>
            <div class="col-2">
                <button class="btn-core w-100" onclick="Logic.switchProject()">Switch</button>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="section-label">02 // Tag Editor</div>
        <label>Current Registered Tags</label>
        <div id="tag_list_container" style="display:flex; flex-wrap:wrap; gap:8px; padding:15px; background:rgba(0,0,0,0.2); border:1px solid #333; margin-bottom:15px; min-height:45px;"></div>
        
        <label>Add New Tag</label>
        <div class="row">
            <div class="col-10">
                <input type="text" id="set_new_tag" placeholder="e.g. ntoskrnl.exe">
            </div>
            <div class="col-2">
                <button class="btn-core btn-save w-100" onclick="Logic.addTag()">Add</button>
            </div>
        </div>
    </div>
</div>
