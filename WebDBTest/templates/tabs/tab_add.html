<div id="tab_add" class="tab-content active">
    <div id="duplicate-warning" style="display: none;">
        <span id="warning-text">Entry already exists for this Name and Tag.</span>
        <button class="btn-core" style="flex: 0 1 auto; height: 25px; padding: 0 10px;" onclick="Logic.jumpToEdit()">Edit Existing</button>
    </div>

    <div class="form-section">
        <div class="section-label">01 // Identity</div>
        <div class="row">
            <div class="col-6">
                <label>Comment Name</label>
                <input type="text" id="add_name" oninput="Logic.checkDuplicate()" placeholder="Symbol Name">
            </div>
            <div class="col-6">
                <label>Tag (Path Element)</label>
                <div style="display:flex; gap:5px;">
                    <select id="add_tag_select" onchange="UI.handleTagChange(); Logic.checkDuplicate();">
                        <option value="">-- Select Tag --</option>
                        <option value="CUSTOM">-- Custom --</option>
                    </select>
                    <input type="text" id="add_tag_custom" style="display:none;" oninput="Logic.checkDuplicate()">
                </div>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="section-label">02 // Classification</div>
        <div class="row">
            <div class="col-2">
                <label>Type</label>
                <select id="add_type_select">
                    <option value="Function">Function</option>
                    <option value="Service">Service</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="col-10">
                <label>Description / Summary</label>
                <textarea id="add_description" style="height: 100px !important;"></textarea>
            </div>
        </div>
    </div>

    <div id="findings_container"></div>

    <div class="footer-actions">
        <button id="btn_save_main" class="btn-core btn-save" onclick="Logic.saveEntry()">Save Entry</button>
        <button class="btn-core" onclick="Logic.resetForm()">Reset Form</button>
        <button class="btn-core" onclick="UI.addFinding()">Add Finding</button>
        <button class="btn-core" onclick="UI.removeFinding()" style="color: var(--error-red); border-color: var(--error-red);">Remove Last</button>
    </div>
</div>
